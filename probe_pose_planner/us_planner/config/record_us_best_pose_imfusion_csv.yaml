# - base_frame: frame you want poses expressed in (must be available in TF)
# - output_csv: output CSV path
# - max_samples: set to 0 for unlimited recording
# - The robot->ImFusion calibration matrix inside the script must match your setup

topic: /us_best_pose
base_frame: world
